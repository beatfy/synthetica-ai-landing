<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#4D94FF"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00B894"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#9D8FFF"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>
  
  <!-- Process Flow -->
  <!-- Step 1 -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="url(#blue)" opacity="0.9"/>
    <text x="60" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="white" font-weight="bold">01</text>
    <text x="60" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white" opacity="0.9">DESCUBRIR</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M230 210 L280 210" stroke="#0066FF" stroke-width="3" stroke-dasharray="8,4" fill="none"/>
  <polygon points="290,210 280,205 280,215" fill="#0066FF"/>
  
  <!-- Step 2 -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="url(#green)" opacity="0.9"/>
    <text x="60" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="white" font-weight="bold">02</text>
    <text x="60" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white" opacity="0.9">DISEÑAR</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M430 210 L480 210" stroke="#00D4AA" stroke-width="3" stroke-dasharray="8,4" fill="none"/>
  <polygon points="490,210 480,205 480,215" fill="#00D4AA"/>
  
  <!-- Step 3 -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="url(#purple)" opacity="0.9"/>
    <text x="60" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="white" font-weight="bold">03</text>
    <text x="60" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white" opacity="0.9">DESARROLLAR</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M630 210 L680 210" stroke="#7B61FF" stroke-width="3" stroke-dasharray="8,4" fill="none"/>
  <polygon points="690,210 680,205 680,215" fill="#7B61FF"/>
  
  <!-- Step 4 -->
  <g transform="translate(340, 330)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="#0A0E27" opacity="0.9"/>
    <text x="60" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="white" font-weight="bold">04</text>
    <text x="60" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white" opacity="0.9">DESPLEGAR</text>
  </g>
  
  <!-- Connecting lines to center -->
  <line x1="160" y1="270" x2="370" y2="350" stroke="#0066FF" stroke-width="2" opacity="0.3"/>
  <line x1="360" y1="270" x2="390" y2="350" stroke="#00D4AA" stroke-width="2" opacity="0.3"/>
  <line x1="560" y1="270" x2="430" y2="350" stroke="#7B61FF" stroke-width="2" opacity="0.3"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="30" fill="#0066FF" opacity="0.1"/>
  <circle cx="750" cy="550" r="40" fill="#00D4AA" opacity="0.1"/>
  <circle cx="700" cy="80" r="25" fill="#7B61FF" opacity="0.1"/>
  
  <!-- Data flow indicators -->
  <g opacity="0.6">
    <circle cx="180" cy="120" r="4" fill="#0066FF"/>
    <circle cx="380" cy="100" r="5" fill="#00D4AA"/>
    <circle cx="580" cy="120" r="4" fill="#7B61FF"/>
    <circle cx="280" cy="480" r="6" fill="#0066FF"/>
    <circle cx="500" cy="500" r="5" fill="#00D4AA"/>
  </g>
  
  <!-- Bottom text -->
  <text x="400" y="550" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#64748b">
    Metodología de Transformación con IA
  </text>
</svg>