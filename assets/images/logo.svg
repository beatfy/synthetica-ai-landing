<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Primary gradient - more sophisticated flow -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="40%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    
    <!-- Secondary gradient for depth -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0.7"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0066FF" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- ========== SOPHISTICATED ICON MARK ========== -->
  <g transform="translate(15, 12)" filter="url(#shadow)">
    <!-- Outer geometric frame - rotated square -->
    <rect x="12" y="12" width="52" height="52" rx="8" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" transform="rotate(45, 38, 38)" opacity="0.4"/>
    
    <!-- Inner "S" morphed shape - main body -->
    <path d="
      M 38 8
      C 52 8, 58 16, 58 24
      C 58 32, 50 36, 38 38
      C 26 40, 18 44, 18 52
      C 18 60, 26 68, 38 68
      C 50 68, 58 60, 58 52
    " fill="none" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" filter="url(#softGlow)"/>
    
    <!-- Accent curve overlay -->
    <path d="
      M 38 12
      C 48 12, 54 18, 54 24
      C 54 30, 48 34, 38 36
    " fill="none" stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    
    <path d="
      M 38 64
      C 28 64, 22 58, 22 52
      C 22 46, 28 42, 38 40
    " fill="none" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Neural nodes - strategic positions -->
    <g filter="url(#softGlow)">
      <!-- Top primary node -->
      <circle cx="38" cy="8" r="5" fill="url(#primaryGrad)"/>
      <circle cx="38" cy="8" r="2.5" fill="#FFFFFF" opacity="0.9"/>
      
      <!-- Secondary nodes along S curve -->
      <circle cx="58" cy="24" r="4" fill="#0066FF"/>
      <circle cx="58" cy="24" r="2" fill="#FFFFFF" opacity="0.8"/>
      
      <circle cx="38" cy="38" r="6" fill="url(#primaryGrad)"/>
      <circle cx="38" cy="38" r="3" fill="#FFFFFF" opacity="0.9"/>
      
      <circle cx="18" cy="52" r="4" fill="#7B61FF"/>
      <circle cx="18" cy="52" r="2" fill="#FFFFFF" opacity="0.8"/>
      
      <!-- Bottom primary node -->
      <circle cx="38" cy="68" r="5" fill="url(#primaryGrad)"/>
      <circle cx="38" cy="68" r="2.5" fill="#FFFFFF" opacity="0.9"/>
    </g>
    
    <!-- Connecting neural lines -->
    <g stroke-width="1" opacity="0.5">
      <line x1="38" y1="8" x2="58" y2="24" stroke="#0066FF" stroke-dasharray="2,2"/>
      <line x1="58" y1="24" x2="38" y2="38" stroke="#00D4AA" stroke-dasharray="2,2"/>
      <line x1="38" y1="38" x2="18" y2="52" stroke="#7B61FF" stroke-dasharray="2,2"/>
      <line x1="18" y1="52" x2="38" y2="68" stroke="#7B61FF" stroke-dasharray="2,2"/>
    </g>
    
    <!-- Subtle orbital ring -->
    <ellipse cx="38" cy="38" rx="32" ry="28" fill="none" stroke="url(#primaryGrad)" stroke-width="0.75" opacity="0.25" transform="rotate(-15, 38, 38)"/>
  </g>
  
  <!-- ========== CUSTOM TYPOGRAPHY ========== -->
  <g transform="translate(100, 0)">
    <!-- SYNTHETICA - Custom styled letters -->
    <text x="0" y="56" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#0A0E27" letter-spacing="3">
      <tspan fill="url(#primaryGrad)">S</tspan><tspan>YNTHETIC</tspan><tspan fill="url(#primaryGrad)">A</tspan>
    </text>
    
    <!-- Accent line under text -->
    <line x1="2" y1="68" x2="215" y2="68" stroke="url(#primaryGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Tagline -->
    <text x="3" y="88" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="4">
      AI CONSULTING
    </text>
    
    <!-- Subtle tech accent -->
    <g opacity="0.3">
      <rect x="2" y="92" width="20" height="1" fill="#0066FF"/>
      <rect x="26" y="92" width="8" height="1" fill="#00D4AA"/>
      <rect x="38" y="92" width="4" height="1" fill="#7B61FF"/>
    </g>
  </g>
</svg>