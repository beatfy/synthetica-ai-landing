<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="50%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#darkBg)"/>
  
  <!-- Dashboard Frame -->
  <rect x="40" y="40" width="720" height="520" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <!-- Header bar -->
  <rect x="40" y="40" width="720" height="60" rx="16" fill="#0f172a"/>
  <rect x="40" y="85" width="720" height="15" fill="#0f172a"/>
  
  <!-- Logo placeholder -->
  <circle cx="80" cy="70" r="15" fill="url(#accentGrad)"/>
  <text x="110" y="75" font-family="Inter, sans-serif" font-size="14" fill="#f8fafc" font-weight="600">Synthetica AI Dashboard</text>
  
  <!-- Navigation dots -->
  <circle cx="700" cy="70" r="6" fill="#00D4AA"/>
  <circle cx="720" cy="70" r="6" fill="#0066FF"/>
  <circle cx="740" cy="70" r="6" fill="#7B61FF"/>
  
  <!-- Stats Cards Row -->
  <!-- Card 1 -->
  <rect x="60" y="120" width="165" height="100" rx="12" fill="#334155" opacity="0.5"/>
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Costes Operativos</text>
  <text x="80" y="185" font-family="Inter, sans-serif" font-size="28" fill="#00D4AA" font-weight="bold">-40%</text>
  <text x="80" y="205" font-family="Inter, sans-serif" font-size="11" fill="#64748b">vs. mes anterior</text>
  
  <!-- Card 2 -->
  <rect x="240" y="120" width="165" height="100" rx="12" fill="#334155" opacity="0.5"/>
  <text x="260" y="150" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Productividad</text>
  <text x="260" y="185" font-family="Inter, sans-serif" font-size="28" fill="#0066FF" font-weight="bold">+3x</text>
  <text x="260" y="205" font-family="Inter, sans-serif" font-size="11" fill="#64748b">mejora media</text>
  
  <!-- Card 3 -->
  <rect x="420" y="120" width="165" height="100" rx="12" fill="#334155" opacity="0.5"/>
  <text x="440" y="150" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Precisión ML</text>
  <text x="440" y="185" font-family="Inter, sans-serif" font-size="28" fill="#7B61FF" font-weight="bold">85%</text>
  <text x="440" y="205" font-family="Inter, sans-serif" font-size="11" fill="#64748b">accuracy score</text>
  
  <!-- Card 4 -->
  <rect x="600" y="120" width="140" height="100" rx="12" fill="#334155" opacity="0.5"/>
  <text x="620" y="150" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">ROI</text>
  <text x="620" y="185" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc" font-weight="bold">6mo</text>
  <text x="620" y="205" font-family="Inter, sans-serif" font-size="11" fill="#64748b">recuperación</text>
  
  <!-- Main Chart Area -->
  <rect x="60" y="240" width="480" height="300" rx="12" fill="#334155" opacity="0.3"/>
  <text x="80" y="270" font-family="Inter, sans-serif" font-size="14" fill="#f8fafc" font-weight="600">Predicción de Demanda</text>
  
  <!-- Chart grid -->
  <g stroke="#475569" stroke-width="0.5" opacity="0.5">
    <line x1="80" y1="300" x2="520" y2="300"/>
    <line x1="80" y1="350" x2="520" y2="350"/>
    <line x1="80" y1="400" x2="520" y2="400"/>
    <line x1="80" y1="450" x2="520" y2="450"/>
    <line x1="80" y1="500" x2="520" y2="500"/>
  </g>
  
  <!-- Chart line - actual -->
  <polyline points="80,480 140,460 200,420 260,440 320,380 380,360 440,340 500,320" 
            fill="none" stroke="#0066FF" stroke-width="3" filter="url(#glow2)"/>
  
  <!-- Chart line - predicted -->
  <polyline points="500,320 540,300 580,290 620,270 660,260 700,240 740,220" 
            fill="none" stroke="#00D4AA" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow2)"/>
  
  <!-- Chart dots -->
  <circle cx="80" cy="480" r="4" fill="#0066FF"/>
  <circle cx="200" cy="420" r="4" fill="#0066FF"/>
  <circle cx="320" cy="380" r="4" fill="#0066FF"/>
  <circle cx="440" cy="340" r="4" fill="#0066FF"/>
  <circle cx="500" cy="320" r="5" fill="#0066FF" stroke="#fff" stroke-width="2"/>
  
  <!-- Right panel - Pie chart -->
  <rect x="560" y="240" width="180" height="180" rx="12" fill="#334155" opacity="0.3"/>
  <text x="580" y="270" font-family="Inter, sans-serif" font-size="12" fill="#f8fafc" font-weight="600">Distribución</text>
  
  <!-- Pie chart -->
  <circle cx="650" cy="350" r="50" fill="none" stroke="#0066FF" stroke-width="20" stroke-dasharray="110 204"/>
  <circle cx="650" cy="350" r="50" fill="none" stroke="#00D4AA" stroke-width="20" stroke-dasharray="60 254" stroke-dashoffset="-110"/>
  <circle cx="650" cy="350" r="50" fill="none" stroke="#7B61FF" stroke-width="20" stroke-dasharray="45 269" stroke-dashoffset="-170"/>
  <circle cx="650" cy="350" r="25" fill="#1e293b"/>
  
  <!-- Legend -->
  <circle cx="580" cy="400" r="4" fill="#0066FF"/>
  <text x="590" y="404" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Automatización 35%</text>
  <circle cx="580" cy="420" r="4" fill="#00D4AA"/>
  <text x="590" y="424" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">ML Models 25%</text>
  <circle cx="580" cy="440" r="4" fill="#7B61FF"/>
  <text x="590" y="444" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Analytics 20%</text>
  
  <!-- Activity log -->
  <rect x="560" y="440" width="180" height="100" rx="12" fill="#334155" opacity="0.3"/>
  <text x="580" y="465" font-family="Inter, sans-serif" font-size="11" fill="#f8fafc" font-weight="600">Actividad Reciente</text>
  <circle cx="590" cy="485" r="3" fill="#00D4AA"/>
  <text x="600" y="489" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8">Modelo entrenado hace 2h</text>
  <circle cx="590" cy="505" r="3" fill="#0066FF"/>
  <text x="600" y="509" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8">Predicciones actualizadas</text>
  <circle cx="590" cy="525" r="3" fill="#7B61FF"/>
  <text x="600" y="529" font-family="Inter, sans-serif" font-size="9" fill="#94a3b8">Nuevo dataset procesado</text>
</svg>