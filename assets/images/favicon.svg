<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="50%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0E27"/>
  
  <!-- Hexagon -->
  <polygon points="32,10 52,20 52,44 32,54 12,44 12,20" 
           fill="none" stroke="url(#favGrad)" stroke-width="2"/>
  
  <!-- Center node -->
  <circle cx="32" cy="32" r="6" fill="url(#favGrad)"/>
  
  <!-- Outer nodes -->
  <circle cx="22" cy="24" r="3" fill="#0066FF"/>
  <circle cx="42" cy="24" r="3" fill="#7B61FF"/>
  <circle cx="22" cy="40" r="3" fill="#00D4AA"/>
  <circle cx="42" cy="40" r="3" fill="#0066FF"/>
  
  <!-- Connections -->
  <line x1="32" y1="32" x2="22" y2="24" stroke="#0066FF" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="32" x2="42" y2="24" stroke="#7B61FF" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="32" x2="22" y2="40" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="32" x2="42" y2="40" stroke="#0066FF" stroke-width="1" opacity="0.6"/>
</svg>