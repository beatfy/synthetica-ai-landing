<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="50%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark -->
  <g transform="translate(20, 20)">
    <!-- Hexagon shape -->
    <polygon points="40,5 70,20 70,50 40,65 10,50 10,20" 
             fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
    
    <!-- Inner circuit pattern -->
    <circle cx="40" cy="35" r="8" fill="url(#logoGrad2)"/>
    <circle cx="25" cy="25" r="4" fill="#0066FF" opacity="0.8"/>
    <circle cx="55" cy="25" r="4" fill="#7B61FF" opacity="0.8"/>
    <circle cx="25" cy="45" r="4" fill="#00D4AA" opacity="0.8"/>
    <circle cx="55" cy="45" r="4" fill="#0066FF" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="40" y1="35" x2="25" y2="25" stroke="#0066FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="35" x2="55" y2="25" stroke="#7B61FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="35" x2="25" y2="45" stroke="#00D4AA" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="35" x2="55" y2="45" stroke="#0066FF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Outer connections -->
    <line x1="40" y1="5" x2="40" y2="27" stroke="url(#logoGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="40" y1="43" x2="40" y2="65" stroke="url(#logoGrad)" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text - White version for dark backgrounds -->
  <text x="100" y="62" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">
    SYNTHETICA
  </text>
  <text x="100" y="82" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" letter-spacing="2">
    AI CONSULTING
  </text>
</svg>