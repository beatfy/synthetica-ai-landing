<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27"/>
      <stop offset="50%" style="stop-color:#141B3D"/>
      <stop offset="100%" style="stop-color:#1A1F36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#0066FF" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  
  <!-- Neural network nodes -->
  <g filter="url(#glow)">
    <!-- Central brain -->
    <circle cx="400" cy="300" r="60" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="400" cy="300" r="40" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
    <circle cx="400" cy="300" r="20" fill="#0066FF"/>
    
    <!-- Connected nodes -->
    <circle cx="250" cy="200" r="15" fill="#0066FF" opacity="0.8"/>
    <circle cx="550" cy="200" r="15" fill="#7B61FF" opacity="0.8"/>
    <circle cx="250" cy="400" r="15" fill="#00D4AA" opacity="0.8"/>
    <circle cx="550" cy="400" r="15" fill="#0066FF" opacity="0.8"/>
    <circle cx="200" cy="300" r="12" fill="#7B61FF" opacity="0.6"/>
    <circle cx="600" cy="300" r="12" fill="#00D4AA" opacity="0.6"/>
    <circle cx="320" cy="150" r="10" fill="#0066FF" opacity="0.7"/>
    <circle cx="480" cy="150" r="10" fill="#00D4AA" opacity="0.7"/>
    <circle cx="320" cy="450" r="10" fill="#7B61FF" opacity="0.7"/>
    <circle cx="480" cy="450" r="10" fill="#0066FF" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="400" y1="300" x2="250" y2="200" stroke="url(#accent)" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="300" x2="550" y2="200" stroke="url(#accent)" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="300" x2="250" y2="400" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="300" x2="550" y2="400" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
    <line x1="250" y1="200" x2="200" y2="300" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>
    <line x1="550" y1="200" x2="600" y2="300" stroke="#00D4AA" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="400" x2="200" y2="300" stroke="#0066FF" stroke-width="1" opacity="0.4"/>
    <line x1="550" y1="400" x2="600" y2="300" stroke="#0066FF" stroke-width="1" opacity="0.4"/>
    <line x1="320" y1="150" x2="250" y2="200" stroke="#0066FF" stroke-width="1" opacity="0.5"/>
    <line x1="480" y1="150" x2="550" y2="200" stroke="#00D4AA" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="450" x2="250" y2="400" stroke="#7B61FF" stroke-width="1" opacity="0.5"/>
    <line x1="480" y1="450" x2="550" y2="400" stroke="#0066FF" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.5">
    <circle cx="150" cy="120" r="3" fill="#0066FF"/>
    <circle cx="650" cy="480" r="4" fill="#00D4AA"/>
    <circle cx="700" cy="150" r="2" fill="#7B61FF"/>
    <circle cx="100" cy="450" r="3" fill="#00D4AA"/>
    <circle cx="720" cy="350" r="2" fill="#0066FF"/>
    <circle cx="80" cy="250" r="3" fill="#7B61FF"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="550" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF" opacity="0.7">
    Intelligent Neural Network Visualization
  </text>
</svg>